ences"]}, {"source": "file:ppc-training-app/src/lib/db-queries/index.ts", "target": "file:ppc-training-app/src/lib/db.ts", "kinds": ["imports"]}, {"source": "file:ppc-training-app/src/lib/db-queries/index.ts", "target": "file:ppc-training-app/src/components/sections/cohorts.tsx", "kinds": ["imports", "references"]}, {"source": "file:ppc-training-app/src/lib/db-queries/index.ts", "target": "file:ppc-training-app/src/components/sections/students.tsx", "kinds": ["imports", "references"]}, {"source": "file:ppc-training-app/src/lib/db-queries/index.ts", "target": "file:ppc-training-app/src/hooks/use-toast.ts", "kinds": ["calls"]}, {"source": "file:ppc-training-app/src/lib/store.ts", "target": "file:ppc-training-app/src/lib/sync.ts", "kinds": ["calls", "imports"]}, {"source": "file:ppc-training-app/src/lib/store.ts", "target": "file:provider-router/backend/plugin_api.py", "kinds": ["calls"]}, {"source": "file:ppc-training-app/src/lib/sync.ts", "target": "file:ppc-training-app/src/lib/store.ts", "kinds": ["imports", "references"]}, {"source": "file:ppc-training-app/src/middleware.ts", "target": "file:provider-router/backend/plugin_api.py", "kinds": ["calls"]}, {"source": "file:provider-router/backend/plugin_api.py", "target": "file:provider-router/backend/router_engine.py", "kinds": ["instantiates", "calls", "imports"]}, {"source": "file:provider-router/backend/router_engine.py", "target": "file:provider-router/backend/plugin_api.py", "kinds": ["calls"]}, {"source": "file:provider-router/backend/router_engine.py", "target": "file:ppc-training-app/src/lib/course-data.ts", "kinds": ["calls"]}, {"source": "file:provider-router/backend/scripts/monitor.py", "target": "file:provider-router/backend/router_engine.py", "kinds": ["instantiates", "calls", "imports"]}, {"source": "file:provider-router/backend/scripts/monitor.py", "target": "file:provider-router/backend/plugin_api.py", "kinds": ["calls"]}, {"source": "file:ppc-training-app/src/components/sections/students.tsx", "target": "file:ppc-training-app/src/components/sections/my-students.tsx", "kinds": ["calls"]}, {"source": "file:ppc-training-app/src/components/sections/students.tsx", "target": "file:ppc-training-app/src/components/sections/my-profile.tsx", "kinds": ["calls"]}];
const groupColors = {"ppc-training-app": "#e74c3c", "provider-router": "#3498db"};

// Build adjacency index for detail panel
const incoming = {};
const outgoing = {};
linksData.forEach(l => {
  const src = l.source;
  const tgt = l.target;
  if (!outgoing[src]) outgoing[src] = [];
  outgoing[src].push({target: tgt, kinds: l.kinds});
  if (!incoming[tgt]) incoming[tgt] = [];
  incoming[tgt].push({source: src, kinds: l.kinds});
});

// Edge kind filter
let activeKinds = ['calls', 'imports', 'references', 'instantiates'];
let filteredLinks = linksData;

function getFilteredLinks() {
  return linksData.filter(l => l.kinds.some(k => activeKinds.includes(k)));
}

// Set up SVG
const container = document.getElementById('graph');
const width = container.clientWidth;
const height = container.clientHeight;

const svg = d3.select('#graph').append('svg')
    .attr('width', '100%')
    .attr('height', '100%')
    .style('cursor', 'grab');

const g = svg.append('g');

svg.call(d3.zoom()
    .scaleExtent([0.1, 8])
    .on('zoom', (event) => {
      g.attr('transform', event.transform);
    }));

function restart(filtered) {
  const currentLinks = filtered || linksData;
  const linkSet = new Set(currentLinks.map(l => l.source + '→' + l.target));
  const connectedNodeIds = new Set();
  currentLinks.forEach(l => { connectedNodeIds.add(l.source); connectedNodeIds.add(l.target); });
  const currentNodes = nodesData.filter(n => connectedNodeIds.has(n.id));

  g.selectAll('*').remove();

  const simulation = d3.forceSimulation(currentNodes)
      .force('link', d3.forceLink(currentLinks).id(d => d.id).distance(100))
      .force('charge', d3.forceManyBody().strength(-300))
      .force('center', d3.forceCenter(width / 2, height / 2))
      .force('collision', d3.forceCollide().radius(30));

  const link = g.append('g')
      .selectAll('line')
      .data(currentLinks)
      .join('line')
      .attr('stroke', '#999')
      .attr('stroke-opacity', 0.4)
      .attr('stroke-width', d => Math.min(1 + d.kinds.length * 0.5, 4));

  const node = g.append('g')
      .selectAll('g')
      .data(currentNodes)
      .join('g')
      .call(d3.drag()
          .on('start', (event, d) => {
            if (!event.active) simulation.alphaTarget(0.3).restart();
            d.fx = d.x; d.fy = d.y;
          })
          .on('drag', (event, d) => { d.fx = event.x; d.fy = event.y; })
          .on('end', (event, d) => {
            if (!event.active) simulation.alphaTarget(0);
            d.fx = null; d.fy = null;
          }));

  node.append('circle')
      .attr('r', d => Math.max(4, 8 - (currentNodes.length > 200 ? 3 : 0)))
      .attr('fill', d => groupColors[d.group] || '#999')
      .attr('stroke', '#fff')
      .attr('stroke-width', 1.5)
      .style('cursor', 'pointer');

  node.append('text')
      .text(d => d.file)
      .attr('x', 10)
      .attr('y', 3)
      .attr('font-size', currentNodes.length > 200 ? '8px' : '10px')
      .attr('fill', '#333');

  node.append('title').text(d => d.fullPath);

  // Tooltip on hover
  node.on('mouseover', (event, d) => {
    const tip = document.getElementById('tooltip');
    tip.textContent = d.fullPath + ' (' + d.group + ')';
    tip.style.display = 'block';
    tip.style.left = (event.pageX + 12) + 'px';
    tip.style.top = (event.pageY - 28) + 'px';
  }).on('mouseout', () => {
    document.getElementById('tooltip').style.display = 'none';
  });

  // Detail panel on click
  node.on('click', (event, d) => {
    event.stopPropagation();
    showDetail(d);
  });

  simulation.on('tick', () => {
    link.attr('x1', d => d.source.x).attr('y1', d => d.source.y)
        .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
    node.attr('transform', d => `translate(${d.x},${d.y})`);
  });
}

function showDetail(d) {
  const panel = document.getElementById('detailPanel');
  document.getElementById('detailName').textContent = d.file;
  document.getElementById('detailPath').textContent = d.fullPath;

  const inc = incoming[d.id] || [];
  const out = outgoing[d.id] || [];
  document.getElementById('detailIncoming').textContent = `Incoming: ${inc.length} edge(s)`;
  document.getElementById('detailOutgoing').textContent = `Outgoing: ${out.length} edge(s)`;

  const connDiv = document.getElementById('detailConnections');
  connDiv.innerHTML = '';

  if (out.length) {
    const h = document.createElement('strong');
    h.textContent = 'Calls / Imports / References to:';
    connDiv.appendChild(h);
    const ul = document.createElement('ul');
    out.forEach(c => {
      const li = document.createElement('li');
      li.textContent = c.target;
      const kindsSpan = document.createElement('span');
      kindsSpan.innerHTML = ' ' + c.kinds.map(k => `<span class="edge-kind">${k}</span>`).join('');
      li.appendChild(kindsSpan);
      ul.appendChild(li);
    });
    connDiv.appendChild(ul);
  }

  if (inc.length) {
    const h = document.createElement('strong');
    h.textContent = 'Called / Imported / Referenced by:';
    connDiv.appendChild(h);
    const ul = document.createElement('ul');
    inc.forEach(c => {
      const li = document.createElement('li');
      li.textContent = c.source;
      const kindsSpan = document.createElement('span');
      kindsSpan.innerHTML = ' ' + c.kinds.map(k => `<span class="edge-kind">${k}</span>`).join('');
      li.appendChild(kindsSpan);
      ul.appendChild(li);
    });
    connDiv.appendChild(ul);
  }

  panel.style.display = 'block';
}

// Close detail panel
document.getElementById('closePanel').addEventListener('click', () => {
  document.getElementById('detailPanel').style.display = 'none';
});

svg.on('click', () => {
  document.getElementById('detailPanel').style.display = 'none';
});

// Edge kind filter buttons
document.getElementById('btnAll').addEventListener('click', function() {
  activeKinds = ['calls', 'imports', 'references', 'instantiates'];
  document.querySelectorAll('.controls button').forEach(b => b.classList.remove('active'));
  this.classList.add('active');
  restart();
});
document.getElementById('btnCalls').addEventListener('click', function() {
  activeKinds = ['calls'];
  document.querySelectorAll('.controls button').forEach(b => b.classList.remove('active'));
  this.classList.add('active');
  restart();
});
document.getElementById('btnImports').addEventListener('click', function() {
  activeKinds = ['imports'];
  document.querySelectorAll('.controls button').forEach(b => b.classList.remove('active'));
  this.classList.add('active');
  restart();
});
document.getElementById('btnReferences').addEventListener('click', function() {
  activeKinds = ['references'];
  document.querySelectorAll('.controls button').forEach(b => b.classList.remove('active'));
  this.classList.add('active');
  restart();
});
document.getElementById('btnReset').addEventListener('click', function() {
  svg.transition().duration(500).call(d3.zoom().transform, d3.zoomIdentity);
});

// Initial render
restart();
</script>
